$mainMod = SUPER

source = ./programs.conf

# Apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, BACKSPACE, exec, $wlogout
bind = $mainMod, B, exec, $waybar
bind = $mainMod, N, exec, $swaync
bind = $mainMod, E, exec, $file_manager
bind = $mainMod SHIFT, S, exec, $hyprshot_region
bind =, Print, exec, $hyprshot_screen

# General
bind = $mainMod, Q, killactive,
bind = $mainMod, P, pseudo,
bind = $mainMod, S, togglesplit,
bind = $mainMod, F11, fullscreen,
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod CTRL SHIFT, Escape, exit,

# Cycle
bind = ALT, TAB, cyclenext,
bind = ALT, TAB, bringactivetotop
bind = $mainMod, TAB, workspace, previous

# Switch workspace
bind = $mainMod, 1, workspace, r~1
bind = $mainMod, 2, workspace, r~2
bind = $mainMod, 3, workspace, r~3
bind = $mainMod, 4, workspace, r~4
bind = $mainMod, 5, workspace, r~5
bind = $mainMod, 6, workspace, r~6
bind = $mainMod, 7, workspace, r~7
bind = $mainMod, 8, workspace, r~8
bind = $mainMod, 9, workspace, r~9
bind = $mainMod, 0, workspace, r~10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, r~1
bind = $mainMod SHIFT, 2, movetoworkspace, r~2
bind = $mainMod SHIFT, 3, movetoworkspace, r~3
bind = $mainMod SHIFT, 4, movetoworkspace, r~4
bind = $mainMod SHIFT, 5, movetoworkspace, r~5
bind = $mainMod SHIFT, 6, movetoworkspace, r~6
bind = $mainMod SHIFT, 7, movetoworkspace, r~7
bind = $mainMod SHIFT, 8, movetoworkspace, r~8
bind = $mainMod SHIFT, 9, movetoworkspace, r~9
bind = $mainMod SHIFT, 0, movetoworkspace, r~10

# Special workspace
bind = $mainMod, X, togglespecialworkspace, special
bind = $mainMod SHIFT, X, movetoworkspace, special:special

# Scrolling layout
bind = $mainMod, V, layoutmsg, colresize +conf
bind = $mainMod, F, layoutmsg, fit active

bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, k, workspace, m-1
bind = $mainMod, j, workspace, m+1

bind = $mainMod SHIFT, k, movetoworkspace, r-1
bind = $mainMod SHIFT, j, movetoworkspace, r+1

bind = $mainMod ALT, k, movefocus, u
bind = $mainMod ALT, j, movefocus, d

bind = $mainMod CTRL, l, layoutmsg, movewindowto r
bind = $mainMod CTRL, h, layoutmsg, movewindowto l
bind = $mainMod CTRL, k, layoutmsg, movewindowto u
bind = $mainMod CTRL, j, layoutmsg, movewindowto d


# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Player control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
