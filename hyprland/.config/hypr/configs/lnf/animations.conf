    animation = windows,       1,     5,     fastBounce,     popin 50%
    animation = windowsIn,     1,     10,    fastSoftBounce, slide top
    animation = windowsOut,    1,     10,    fastSoftBounce, slide bottom

    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick

    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint,   slide right
    animation = layersOut,     1,     1.5,   linear,         slide right
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  quick

    animation = workspacesIn,  1,     4,     fastBounce,     slidefadevert 100%
    animation = workspacesOut, 1,     4,     fastBounce,     slidefadevert 100%

    animation = zoomFactor,    1,     7,     quick
}
