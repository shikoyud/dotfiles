font_family GeistMono Nerd Font
font_size        16

allow_remote_control yes
window_padding_width 10 35
background_opacity 0.5
confirm_os_window_close 0
remember_window_size no
enable_audio_bell no
sync_to_monitor yes

foreground              #e4e4e4
background              #181818

cursor                  #96a6c8
cursor_text_color       #e4e4e4
cursor_shape block
cursor_trail 3
cursor_trail_decay 0.1 0.4

url_color               #FF4F58

